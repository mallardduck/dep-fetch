name: Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read

  goreleaser:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Build dep-fetch
        run: go build -o ./bin/dep-fetch .

      - name: Sync binary deps
        run: ./bin/dep-fetch sync

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
        shell: bash
        run: |-
          ./bin/goreleaser release --clean
          if [[ ! -f dist/metadata.json ]] || [[ ! -s dist/metadata.json ]]; then
            echo "Missing required file: dist/metadata.json"
            exit 1
          fi
          if [[ ! -f dist/artifacts.json ]] || [[ ! -s dist/artifacts.json ]]; then
            echo "Missing required file: dist/artifacts.json"
            exit 1
          fi
          echo "metadata=$(tr -d '\n\r' < dist/metadata.json)" >> "${GITHUB_OUTPUT}"
          echo "artifacts=$(tr -d '\n\r' < dist/artifacts.json)" >> "${GITHUB_OUTPUT}"
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false