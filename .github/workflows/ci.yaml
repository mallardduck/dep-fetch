name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test -v ./...

      - name: Build dep-fetch
        run: go build -o ./bin/dep-fetch .

      - name: Sync binary deps
        run: ./bin/dep-fetch sync

      - name: Run linter
        run: ./bin/golangci-lint run --timeout=5m ./...